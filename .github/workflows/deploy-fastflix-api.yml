name: Deploy FastFlix API

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-fastflix-api.yml'

concurrency:
  group: deploy-fastflix-api
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: bzrjoh/fastflix-api-hono:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Watchtower on VPS auto-detects new images every 30s and redeploys
      - name: Deployment note
        run: echo "Image pushed to Docker Hub. Watchtower on VPS will auto-deploy within 30 seconds."
